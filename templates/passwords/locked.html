<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Passwords — Juanita Banana</title>
    <style>
        {shared_css}
    </style>
</head>
<body class="jb-page">
    <div class="jb-container jb-container-narrow">
        <div class="jb-card jb-text-center">
            <div class="jb-hero-emoji">🔐</div>
            <h1 class="jb-title">Password Vault</h1>
            <p class="jb-text-secondary">Enter your master password to unlock saved credentials.</p>
            <form method="get" action="juanita://passwords" style="display: flex; flex-direction: column; gap: 12px; margin-top: 16px;">
                <input class="jb-input jb-btn-full" type="password" name="unlock_pass" placeholder="Master password" autofocus style="box-sizing: border-box;">
                <button class="jb-btn jb-btn-primary jb-btn-full" type="submit" style="box-sizing: border-box;">Unlock</button>
            </form>
        </div>
    </div>
</body>
</html>
